name: Prek

on:
  merge_group:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run_prek:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: cachix/install-nix-action@v31.10.4

      - name: Pre-build devShell
        run: nix build --accept-flake-config --no-link .#devShells.$(nix eval --impure --raw --expr 'builtins.currentSystem').default

      - name: Install pnpm dependencies
        shell: 'nix develop --accept-flake-config -c bash -e {0}'
        run: pnpm install

      - name: Run prek
        shell: 'nix develop --accept-flake-config -c bash -e {0}'
        run: prek run -a
